name: Template Governance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  template-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:templates
      - run: node --check packages/cli/src/index.js
