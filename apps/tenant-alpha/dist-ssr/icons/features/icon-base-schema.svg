<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <defs>
    <linearGradient id="g-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84ABFF"/>
      <stop offset="1" stop-color="#0F52E0"/>
    </linearGradient>
    <linearGradient id="g-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#84ABFF"/>
      <stop offset="1" stop-color="#0F52E0"/>
    </linearGradient>
    <linearGradient id="g-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#84ABFF"/>
    </linearGradient>
  </defs>
  <!-- Foundation base bar -->
  <rect fill="none" stroke="url(#g-main)" stroke-width="8" stroke-linejoin="round"
        x="16" y="152" width="168" height="32" rx="8"/>
  <!-- Anchor dot at base center -->
  <circle fill="url(#g-accent)" cx="100" cy="168" r="7"/>
  <!-- Vertical stems connecting fragments to base -->
  <path fill="none" stroke="url(#g-body)" stroke-linecap="round" stroke-width="5"
        opacity="0.5" d="M54,138 v14"/>
  <path fill="none" stroke="url(#g-body)" stroke-linecap="round" stroke-width="5"
        opacity="0.5" d="M146,138 v14"/>
  <!-- Fragment left — BaseSectionData -->
  <rect fill="none" stroke="url(#g-body)" stroke-width="6" stroke-linejoin="round"
        x="16" y="68" width="76" height="70" rx="9"/>
  <!-- Fragment left content -->
  <rect fill="url(#g-body)" opacity="0.55" x="28" y="84" width="42" height="6" rx="3"/>
  <rect fill="url(#g-body)" opacity="0.4"  x="28" y="98" width="54" height="6" rx="3"/>
  <rect fill="url(#g-accent)" x="28" y="112" width="32" height="6" rx="3"/>
  <!-- Fragment right — BaseArrayItem -->
  <rect fill="none" stroke="url(#g-body)" stroke-width="6" stroke-linejoin="round"
        x="108" y="44" width="76" height="94" rx="9"/>
  <!-- Fragment right content -->
  <rect fill="url(#g-body)" opacity="0.55" x="120" y="60"  width="42" height="6" rx="3"/>
  <rect fill="url(#g-body)" opacity="0.4"  x="120" y="74"  width="54" height="6" rx="3"/>
  <rect fill="url(#g-body)" opacity="0.4"  x="120" y="88"  width="38" height="6" rx="3"/>
  <rect fill="url(#g-accent)" x="120" y="102" width="32" height="6" rx="3"/>
  <rect fill="url(#g-accent)" opacity="0.6" x="120" y="116" width="48" height="6" rx="3"/>
  <!-- Horizontal connection between fragments -->
  <path fill="none" stroke="url(#g-main)" stroke-linecap="round" stroke-width="4"
        opacity="0.35" d="M92,105 h16"/>
</svg>
