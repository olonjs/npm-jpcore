<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <defs>
    <linearGradient id="g-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84ABFF"/>
      <stop offset="1" stop-color="#0F52E0"/>
    </linearGradient>
    <linearGradient id="g-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#84ABFF"/>
    </linearGradient>
  </defs>
  <!-- Terminal frame -->
  <rect fill="none" stroke="url(#g-main)" stroke-width="7" stroke-linejoin="round"
        x="14" y="22" width="172" height="128" rx="12"/>
  <!-- Top bar divider -->
  <path fill="none" stroke="url(#g-main)" stroke-linecap="round" stroke-width="5"
        d="M14,52 h172"/>
  <!-- Traffic dots -->
  <circle fill="url(#g-main)" opacity="0.4" cx="34" cy="37" r="5"/>
  <circle fill="url(#g-main)" opacity="0.6" cx="52" cy="37" r="5"/>
  <circle fill="url(#g-accent)" cx="70" cy="37" r="5"/>
  <!-- Prompt chevron > -->
  <path fill="none" stroke="url(#g-accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"
        d="M28,75 l12,11 -12,11"/>
  <!-- Cursor line (accent) -->
  <rect fill="url(#g-accent)" x="48" y="80" width="22" height="7" rx="3.5"/>
  <!-- Output lines -->
  <rect fill="url(#g-main)" opacity="0.7" x="28" y="106" width="88" height="6" rx="3"/>
  <rect fill="url(#g-main)" opacity="0.5" x="28" y="121" width="62" height="6" rx="3"/>
  <rect fill="url(#g-main)" opacity="0.35" x="28" y="136" width="76" height="6" rx="3"/>
  <!-- Projection arrow out bottom-right -->
  <path fill="none" stroke="url(#g-accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="5.5"
        d="M155,116 h28 v58"/>
  <path fill="none" stroke="url(#g-accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="5.5"
        d="M174,156 l9,9 9,-9"/>
</svg>
